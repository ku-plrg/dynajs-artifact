name: "SetData While"
pattern: |
    1. Let {{ length : var }} be the number of elements in {{ base'0 : ref }}.
    1. Let {{ index : var }} be 0.
    1. Repeat, while {{ index }} < {{ length }},
      1. Let {{ elem : var }} be {{ base'1 }}[ {{ index }} ].
      1. {{ body : step* }}
replace: |
    1. Perform IN__SetDataIterate({{ base'1 }}, closure({{ elem }}) { {{ body }} }).
where:
  - isSetData(base)
  - { isSetData: "_ (.[[SetData]] | .[[WeakSetData]]) .copy*" }
subrules:
  - name: Remove Set Length
    pattern: "1. Set {{ length }} to the number of elements in {{ base'1 }}."
    replace: "1. Do nothing."
  - name: Remove Index Increment
    pattern: "1. Set {{ index }} to {{ index }} + 1."
    replace: "1. Do nothing."
  - name: SetData Remove (index)
    pattern: "1. Set {{ base'1 }}[ {{ index }} ] to ~empty~."
    replace: "1. Perform IN__SetDataRemove({{ base'1 }}, {{ elem }})."
